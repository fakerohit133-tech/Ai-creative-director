@"
workflows:
  android-release:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build//outputs//*.apk
"@ | Out-File -FilePath codemagic.yaml -Encoding utf8
