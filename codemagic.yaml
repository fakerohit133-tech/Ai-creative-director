workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: 3.22.0
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --no-sound-null-safety
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - fakerohit133@gmail.com
